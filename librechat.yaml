version: 1.3.13
cache: false
ocr:
  strategy: "mistral_ocr"
  apiKey: "placeholder"          # any value; Tesseract ignores it
  baseURL: "http://ocr-service:8003/v1" #baseURL: "http://172.22.0.1:8003/v1"
memory:
  disabled: true         # completely disables memory
fileConfig:
  endpoints:
    vLLM:
      fileLimit: 5
      fileSizeLimit: 35
      totalSizeLimit: 50
      supportedMimeTypes:
        - "^image/(jpeg|png|gif|webp)$"
        - "application/pdf"
        - "application/vnd\\.openxmlformats-officedocument\\..*"
        - "application/vnd\\.ms-(word|powerpoint|excel)$"
        - "text/.*"
    vLLM-Thinking:
      fileLimit: 5
      fileSizeLimit: 35
      totalSizeLimit: 50
      supportedMimeTypes:
        - "^image/(jpeg|png|gif|webp)$"
        - "application/pdf"
        - "application/vnd\\.openxmlformats-officedocument\\..*"
        - "application/vnd\\.ms-(word|powerpoint|excel)$"
        - "text/.*"
  ocr:
    supportedMimeTypes:
      - "^application/pdf$"
      - "^image/(jpeg|gif|png|webp|heic|heif)$"
      - "^application/vnd\\.openxmlformats-officedocument\\.(wordprocessingml\\.document|presentationml\\.presentation|spreadsheetml\\.sheet)$"
      - "^application/vnd\\.ms-(word|powerpoint|excel)$"
  serverFileSizeLimit: 100
interface:
  agents: false        # removes the Agents endpoint/button
  fileSearch: true       # enables the "Upload for File Search" chat-area option
  webSearch: true
  modelSelect: false      # keep the model/endpoint selector visible
  endpointsMenu: false 
  parameters: false       # ← brings back the parameters/settings panel
  presets: true          # ← lets users save/tweak presets
  multiConvo: false 
  sharedLinks: false        # disable public conversation sharing
  agentApiKeys: false       # disable user-generated agent API keys
  buildInfo: false
  memories: false
  customWelcome: "Welcome to UD Assistant. Ask a question, upload a document, or share an image to get started.."
endpoints:
  agents:
    disableBuilder: true          # keep the agent builder hidden (simplified UI)
    recursionLimit: 25
    maxRecursionLimit: 27
    capabilities:
      - "file_search"             # surfaces "Upload for File Search" (RAG)
      - "context"                 # surfaces "Upload as Text"
      - "ocr"                     # optional: better text extraction from scans
      - "web_search"
      - "artifacts" 
  custom:
    - name: "vLLM"
      apiKey: "${VLLM_API_KEY}"
      baseURL: "http://172.22.0.1:8000/v1" #"http://vllm-lb:8000/v1" for nginx 
      models:
        default: ["Qwen/Qwen3.6-35B-A3B-FP8"]
        fetch: true
      titleConvo: true
      titleModel: "Qwen/Qwen3.6-35B-A3B-FP8"
      modelDisplayLabel: "Qwen3.6-35B"
      maxContextTokens: 180000
      addParams:
        temperature: 0.7
        top_p: 0.8
        presence_penalty: 1.5
        max_tokens: 10000
        streamUsage: true
        chat_template_kwargs:
          enable_thinking: false

    - name: "vLLM-Thinking"
      apiKey: "${VLLM_API_KEY}"
      baseURL: "http://172.22.0.1:8000/v1" #"http://vllm-lb:8000/v1" for nginx 
      customParams:
        reasoningKey: "reasoning"
      models:
        default: ["Qwen/Qwen3.6-35B-A3B-FP8"]
        fetch: true
      titleConvo: true
      titleModel: "Qwen/Qwen3.6-35B-A3B-FP8"
      modelDisplayLabel: "Qwen3.6-35B (Thinking)"
      maxContextTokens: 180000
      addParams:
        max_tokens: 32000
        temperature: 0.6
        top_p: 0.95
        top_k: 20
        min_p: 0
        presence_penalty: 1.05
        streamUsage: true
        chat_template_kwargs:
          enable_thinking: true 

modelSpecs:
  enforce: true        # false = your prompt is the DEFAULT, users can still tweak params
  prioritize: true      # this spec is the default selection on new chats
  list:
    - name: "ud-assistant"
      label: "UD Assistant"
      default: true
      description: "Fast answers for everyday questions"
      webSearch: true 
      fileSearch: true 
      artifacts: true
      preset:
        endpoint: "vLLM"                                   # MUST match your custom endpoint name exactly
        model: "Qwen/Qwen3.6-35B-A3B-FP8"
        temperature: 0.7    # lower default temperature
        top_p: 0.8
        presence_penalty: 1.5
        maxContextTokens: 180000

        promptPrefix: |
          Give correct, well-grounded answers. An incomplete but grounded answer is a
          success. A complete answer containing an unverified specific is a failure.
          So is searching after you already have the answer.

          === GROUNDING ===
          Every specific — dates, deadlines, names, titles, numbers, credits, prices,
          form names, URLs — must come from a result you retrieved this turn. No
          estimates, typical values, or plausible reconstruction.

          Explanations, summaries, and diagrams about a real institution, program, or
          process are FACTUAL and need grounding for each specific they contain.
          Answer without searching only for generic writing, code, math, and concepts
          naming no real entity. For uploaded documents, answer from the document.

          Retrieved results describe the present; your training data is old. If results
          report events you believe are in the future, the results are right.

          === SEARCHING ===
          At most 2 tool turns per response. Turn 1: search. Turn 2 (only if turn 1
          lacked the answer): search differently. Then tool calls are FORBIDDEN — write
          the answer, marking gaps as "not found in my sources."

          STOP as soon as any retrieved document contains the substance of the answer,
          even partially. One relevant document is sufficient grounding. Never search to
          double-check, cross-confirm, or find a cleaner source for something you already
          have. "Comprehensive" means thorough use of what you retrieved, never more
          searching. Irrelevant results alongside relevant ones are normal — use the
          relevant ones. A partial answer beats another search and beats an error.

          Queries must be plain phrases of 4-10 words. NEVER use quotes, site:, OR, or
          boolean syntax — they return almost nothing with this backend. If a search
          disappoints, rephrase plainly rather than adding operators.

          === SOURCES ===
          Institution-specific facts must come from that institution's own domain; never
          transfer a policy or deadline from a similar organization. Prefer official
          pages over aggregators. Only give URLs that appeared verbatim in results.

          Retrieved document text IS a source — use it, and quote it when asked for exact
          wording or requirements. If you retrieved a document's text, never claim you
          couldn't access it; if you got only titles or snippets, say exactly that.

          When multiple versions of a policy appear, use only the current one. Treat
          archived/dated sources (older catalog years, /wordpress/, /udspace/, www1,
          year-stamped PDFs) as superseded. Never merge two versions into one
          description. If you can't tell which is current, say so and date what you used.

          === WHAT YOU WON'T DO ===
          Name what you couldn't confirm and where to look. Never supply placeholder
          values, and never put an unverified specific in a table, numbered step, or
          bolded deadline. Don't say something was unavailable and then provide it.

          You cannot reproduce logos, trademarks, or exact visual designs. If told your
          attempt is wrong, don't search — say you can't reproduce it and offer an
          original.

          For named individuals: give only professional role and affiliation from
          official pages. No personal location, home city, or biographical details, even
          if they appear in results. Never guess or construct an email address.

          Once you decline a request, do not re-plan it or search for alternatives.
          Respond briefly, offer one legitimate alternative if obvious, and move on.
    - name: "ud-assistant-thinking"
      label: "UD Assistant (Deep thinking, Experimental)"
      default: false
      description: "Slower, reasons step-by-step. Best for complex questions. Experimental — if the thinking section starts repeating itself, press stop and ask again."
      webSearch: true 
      fileSearch: true 
      artifacts: true
      preset:
        endpoint: "vLLM-Thinking"                                   # MUST match your custom endpoint name exactly
        model: "Qwen/Qwen3.6-35B-A3B-FP8"
        temperature: 0.6
        top_p: 0.95
        top_k: 20
        min_p: 0
        max_tokens: 32000
        presence_penalty: 1.05
        maxContextTokens: 180000

        promptPrefix: |
          Give correct, well-grounded answers. An incomplete but grounded answer is a
          success. A complete answer containing an unverified specific is a failure.
          So is searching after you already have the answer.

