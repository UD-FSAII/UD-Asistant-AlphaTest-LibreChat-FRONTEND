# ud-assistant.conf — HTTPS reverse proxy for LibreChat
# Terminates TLS and proxies to the LibreChat api container on :3080.
# Mounted into the nginx container at /etc/nginx/conf.d/default.conf
#
# >>> EDIT the two server_name lines + the ssl_certificate paths to match
#     your DuckDNS hostname. Placeholder: alphatest.udassistant.com <<<

# Maps the Upgrade header to the right Connection value for WebSockets.
# Must be defined before the server blocks that use $connection_upgrade.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# --- HTTP :80 -> redirect everything to HTTPS ---
# (Kept even though the host is VPN-internal: browsers/users typing http:// get
#  bounced to https:// instead of a dead connection. No ACME http-01 here — we
#  validate via DNS-01, so port 80 carries only the redirect.)
# server {
#     listen 80;
#     listen [::]:80;
#     server_name alphatest.udassistant.com;

#     return 301 https://$host$request_uri;
# }

# --- HTTPS :443 -> LibreChat ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name alphatest.udassistant.com;

    # Let's Encrypt cert (issued via certbot DNS-01, section below).
    # These paths are inside the container; the compose file mounts the host's
    # /etc/letsencrypt read-only to the same path.
    ssl_certificate     /etc/letsencrypt/live/alphatest.udassistant.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/alphatest.udassistant.com/privkey.pem;

    # Modern, safe TLS defaults.
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # HSTS: tell browsers to always use HTTPS for this host for 6 months.
    # Safe here because you intend this host to be HTTPS-only. Remove if you
    # ever need plain HTTP on the same name.
    add_header Strict-Transport-Security "max-age=15768000" always;

    # LibreChat can upload large files (RAG docs) — don't cap the body.
    client_max_body_size 0;

    location / {
        # LibreChat api container on the shared docker network, port 3080.
        proxy_pass http://api:3080;

        # --- WebSocket + SSE support (LibreChat streams tokens over both) ---
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;            # stream responses, don't buffer

        # --- Standard proxy headers ---
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # --- Generous timeouts for long generations ---
        proxy_connect_timeout 10s;
        proxy_send_timeout    600s;
        proxy_read_timeout    600s;
    }
}

# --- HTTPS :443 -> UD Assistant personal stats app ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name metrics.alphatest.udassistant.com;

    ssl_certificate     /etc/letsencrypt/live/metrics.alphatest.udassistant.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/metrics.alphatest.udassistant.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=15768000" always;

    location / {
        proxy_pass http://stats-app:8090;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}

# --- HTTPS :443 -> UD Assistant admin feedback dashboard ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name feedback.alphatest.udassistant.com;

    ssl_certificate     /etc/letsencrypt/live/feedback.alphatest.udassistant.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/feedback.alphatest.udassistant.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header Strict-Transport-Security "max-age=15768000" always;

    location / {
        proxy_pass http://feedback-admin:8091;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
