# vllm-lb.conf — nginx reverse proxy / load balancer for vLLM
# Fans one endpoint (:8000) across 2 identical Qwen3 backends.
# Mounted into the nginx container at /etc/nginx/conf.d/default.conf
#
# TOPOLOGY (per your setup):
#   - Spark A vLLM is HOST-run on the SAME box as this nginx container,
#     so it is reached via the docker bridge gateway 172.22.0.1:8000
#     (NOT 127.0.0.1 — loopback inside the container is the container itself).
#   - Spark B vLLM is remote over the UD network at its routable IP.
#
# >>> EDIT the Spark B IP below (128.175.x.x) before deploying. <<<

# Custom log format that records WHICH backend served each request.
#   $upstream_addr        = the Spark that handled it (172.22.0.1 = A, 128.4.188.154 = B)
#   $status               = HTTP status nginx returned to the client
#   $request_time         = total time nginx spent on the request (s)
#   $upstream_response_time = time the backend itself took (s)
log_format lb '$remote_addr -> $upstream_addr '
              '[$status] req=$request_time upstream=$upstream_response_time '
              '"$request"';

upstream vllm_backends {
    # least_conn: route to whichever backend has the fewest active requests.
    # Correct for LLM traffic where request cost varies wildly (short chat vs.
    # long RAG context). Round-robin would pile long requests onto a busy box.
    least_conn;

    # Spark A — local, via docker gateway.
    server 172.22.0.1:8000    max_fails=3 fail_timeout=30s;

    # Spark B — remote over UD network. EDIT THIS IP.
    server 128.4.188.154:8000 max_fails=3 fail_timeout=30s;

    # Passive health checks: after 3 failed attempts within 30s, nginx marks
    # the backend down and stops sending to it for 30s, then retries.
    # (Active health checks require nginx-plus; passive is fine for vLLM.)

    keepalive 32;   # reuse upstream connections; cuts TCP/TLS setup churn
}

server {
    listen 8000;
    server_name _;

    # Log every request with the backend it was routed to (format defined above).
    # Goes to stdout/stderr via the symlinks in the nginx image, so it shows up in
    # `docker logs vllm-lb`. No log file to rotate.
    access_log /var/log/nginx/access.log lb;

    # No client-body size cap — RAG requests can carry large context payloads.
    client_max_body_size 0;

    location / {
        proxy_pass http://vllm_backends;

        # --- SSE / streaming: the critical block for token-by-token output ---
        proxy_buffering off;            # don't buffer the response; stream it
        proxy_cache off;
        proxy_set_header Connection ""; # enable HTTP/1.1 keepalive upstream
        proxy_http_version 1.1;
        chunked_transfer_encoding on;

        # --- Generous timeouts: long generations must not be cut off ---
        proxy_connect_timeout 10s;      # fail fast if a backend is unreachable
        proxy_send_timeout    600s;
        proxy_read_timeout    600s;     # 10 min ceiling for a single response

        # --- Pass through standard headers ---
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # --- Retry the OTHER backend on connection-level failure ---
        # Safe because vLLM is stateless. Does NOT retry after headers have
        # been sent (can't un-stream), so a mid-stream crash still surfaces.
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_next_upstream_tries 2;
    }

    # Lightweight liveness endpoint for your own monitoring / the compose
    # healthcheck. vLLM serves /health on the same port.
    location = /lb-health {
        access_log off;
        return 200 "vllm-lb ok\n";
        add_header Content-Type text/plain;
    }
}