# Please consult our docs for more info: https://www.librechat.ai/docs/configuration/docker_override

# TO USE THIS FILE, FIRST UNCOMMENT THE LINE ('services:')

# THEN UNCOMMENT ONLY THE SECTION OR SECTIONS CONTAINING THE CHANGES YOU WANT TO APPLY
# SAVE THIS FILE AS 'docker-compose.override.yaml'
# AND USE THE 'docker compose build' & 'docker compose up -d' COMMANDS AS YOU WOULD NORMALLY DO

# WARNING: YOU CAN ONLY SPECIFY EVERY SERVICE NAME ONCE (api, mongodb, meilisearch, ...)
# IF YOU WANT TO OVERRIDE MULTIPLE SETTINGS IN ONE SERVICE YOU WILL HAVE TO EDIT ACCORDINGLY

# EXAMPLE: if you want to use the config file and the latest numbered release docker image the result will be:
services:
  api:
    volumes:
      - ./librechat.yaml:/app/librechat.yaml
      - ./client/public/assets:/app/client/public/assets
      - ./client/public/assets/logo.svg:/app/client/dist/assets/logo.svg
      - ./client/public/assets/favicon-16x16.png:/app/client/dist/assets/favicon-16x16.png
      - ./client/public/assets/favicon-32x32.png:/app/client/dist/assets/favicon-32x32.png
      - ./client/public/assets/apple-touch-icon-180x180.png:/app/client/dist/assets/apple-touch-icon-180x180.png
      - ./client/public/assets/icon-192x192.png:/app/client/dist/assets/icon-192x192.png
      # - ./index.html:/app/client/dist/index.html
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # image: ghcr.io/danny-avila/librechat:v0.8.7   # upstream prebuilt (rollback: uncomment this, comment build)
    build:
      context: .
      dockerfile: Dockerfile
    image: ud-librechat:local
    environment:
      # Langfuse tracing — pulled from .env at compose-parse time and injected
      # explicitly, because the api container does not blanket-load .env.
      - LANGFUSE_PUBLIC_KEY=${LANGFUSE_PUBLIC_KEY}
      - LANGFUSE_SECRET_KEY=${LANGFUSE_SECRET_KEY}
      - LANGFUSE_BASE_URL=${LANGFUSE_BASE_URL}
  # admin-panel:
  #     ports:
  #       - "127.0.0.1:3004:3000"

  rag_api:
    image: rag-api-ocr:local
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # OCR fallback settings (defaults shown; override if needed)
      - OCR_FALLBACK_ENABLED=true
      - OCR_FALLBACK_URL=http://ocr-service:8003/v1/ocr #http://172.22.0.1:8003/v1/ocr
      - OCR_FALLBACK_MIN_CHARS=50
      - OCR_FALLBACK_TIMEOUT=120
    # Notice this is the dev image, NOT the dev-lite image
    # image: ghcr.io/danny-avila/librechat-rag-api-dev:latest
